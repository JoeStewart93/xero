name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "24"

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: platform/backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Lint backend
        run: python scripts/ci.py backend-lint

      - name: Check OpenAPI drift
        run: python scripts/ci.py openapi-check

      - name: Run backend unit tests
        run: python scripts/ci.py backend-unit

      - name: Run backend behave tests
        run: python scripts/ci.py backend-behave

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint frontend
        run: python scripts/ci.py frontend-lint

      - name: Run frontend unit tests
        run: python scripts/ci.py frontend-test

      - name: Build frontend
        run: python scripts/ci.py frontend-build

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: platform/backend
          push: false
          load: true
          tags: xero-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: platform/frontend
          push: false
          load: true
          tags: xero-frontend:ci
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000

      - name: Capture Docker build metadata
        run: |
          mkdir -p artifacts
          docker image inspect xero-backend:ci > artifacts/xero-backend-image.json
          docker image inspect xero-frontend:ci > artifacts/xero-frontend-image.json
          docker images "xero-*" > artifacts/docker-images.txt

      - name: Upload Docker build metadata
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: docker-build-metadata
          path: artifacts/
          retention-days: 14

  compose-e2e:
    name: compose-e2e
    runs-on: ubuntu-latest
    needs:
      - docker-build
    defaults:
      run:
        working-directory: platform
    env:
      COMPOSE_PROJECT_NAME: xero-ci
      BACKEND_PORT: "18000"
      FRONTEND_PORT: "13000"
      VITE_API_BASE_URL: http://localhost:18000
      FRONTEND_ORIGIN: http://localhost:13000
      PLAYWRIGHT_BASE_URL: http://localhost:13000
      XERO_BACKEND_URL: http://localhost:18000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: platform/backend/requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt
          npm ci --prefix frontend
          npx --prefix frontend playwright install --with-deps chromium

      - name: Start Compose stack
        run: docker compose up -d --build

      - name: Run Compose integration tests
        run: python scripts/ci.py backend-integration

      - name: Run Playwright smoke tests
        run: python scripts/ci.py playwright

      - name: Collect Compose logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose ps > artifacts/compose-ps.txt
          docker compose logs --no-color > artifacts/compose.log

      - name: Upload failure artifacts
        if: ${{ failure() && env.ACT != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: compose-e2e-failure
          path: |
            platform/artifacts/
            platform/test-results/
            platform/playwright-report/
          retention-days: 14

      - name: Stop Compose stack
        if: always()
        run: docker compose down --volumes --remove-orphans
