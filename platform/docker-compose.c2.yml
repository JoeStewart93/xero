name: xero-c2

services:
  c2-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${C2_POSTGRES_DB:-xero_c2}
      POSTGRES_USER: ${C2_POSTGRES_USER:-xero_c2}
      POSTGRES_PASSWORD: ${C2_POSTGRES_PASSWORD:-xero_c2_password}
    volumes:
      - xero_c2_postgres_data:/var/lib/postgresql/data
    networks:
      - xero-c2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  c2-redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - xero_c2_redis_data:/data
    networks:
      - xero-c2
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  c2-backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      XERO_SERVICE_NAME: ${C2_SERVICE_NAME:-xero-c2-core}
      XERO_SERVICE_ROLE: c2
      DATABASE_URL: ${C2_DATABASE_URL:-postgresql://xero_c2:xero_c2_password@c2-postgres:5432/xero_c2}
      DATABASE_POOL_SIZE: ${C2_DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${C2_DATABASE_MAX_OVERFLOW:-10}
      DATABASE_POOL_TIMEOUT_SECONDS: ${C2_DATABASE_POOL_TIMEOUT_SECONDS:-30}
      DATABASE_POOL_RECYCLE_SECONDS: ${C2_DATABASE_POOL_RECYCLE_SECONDS:-1800}
      REDIS_URL: ${C2_REDIS_URL:-redis://c2-redis:6379/0}
      REDIS_MAX_CONNECTIONS: ${C2_REDIS_MAX_CONNECTIONS:-20}
      REDIS_QUEUE_DEQUEUE_TIMEOUT_SECONDS: ${C2_REDIS_QUEUE_DEQUEUE_TIMEOUT_SECONDS:-1}
      REDIS_RATE_LIMIT_ENABLED: ${C2_REDIS_RATE_LIMIT_ENABLED:-true}
      REDIS_RATE_LIMIT_REQUESTS: ${C2_REDIS_RATE_LIMIT_REQUESTS:-120}
      REDIS_RATE_LIMIT_WINDOW_SECONDS: ${C2_REDIS_RATE_LIMIT_WINDOW_SECONDS:-60}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      OPERATOR_USERNAME: ${C2_OPERATOR_USERNAME:-operator}
      OPERATOR_PASSWORD: ${C2_OPERATOR_PASSWORD:-operator_password}
      LOCAL_ADMIN_USERNAME: ${C2_LOCAL_ADMIN_USERNAME:-admin}
      LOCAL_ADMIN_PASSWORD: ${C2_LOCAL_ADMIN_PASSWORD:-admin}
      JWT_SECRET_KEY: ${C2_JWT_SECRET_KEY:-dev-only-xero-jwt-secret-change-me}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-60}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      C2_CONNECT_PASSWORD: ${C2_CONNECT_PASSWORD:-c2_password}
      C2_TOKEN_EXPIRES_MINUTES: ${C2_TOKEN_EXPIRES_MINUTES:-480}
      BEACON_DEFAULT_SLEEP_SECONDS: ${BEACON_DEFAULT_SLEEP_SECONDS:-30}
      BEACON_DEFAULT_JITTER: ${BEACON_DEFAULT_JITTER:-0.1}
      BEACON_HEARTBEAT_CHECK_INTERVAL_SECONDS: ${BEACON_HEARTBEAT_CHECK_INTERVAL_SECONDS:-30}
      BEACON_STALE_THRESHOLD_MULTIPLIER: ${BEACON_STALE_THRESHOLD_MULTIPLIER:-3}
    ports:
      - "${C2_BACKEND_PORT:-8001}:8000"
    depends_on:
      c2-postgres:
        condition: service_healthy
      c2-redis:
        condition: service_healthy
    networks:
      - xero-c2
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=3).read()\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

networks:
  xero-c2:
    driver: bridge

volumes:
  xero_c2_postgres_data:
  xero_c2_redis_data:
