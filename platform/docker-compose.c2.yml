name: xero-c2

services:
  c2-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${C2_POSTGRES_DB:-xero_c2}
      POSTGRES_USER: ${C2_POSTGRES_USER:-xero_c2}
      POSTGRES_PASSWORD: ${C2_POSTGRES_PASSWORD:-xero_c2_password}
    volumes:
      - xero_c2_postgres_data:/var/lib/postgresql/data
    networks:
      - xero-c2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  c2-redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - xero_c2_redis_data:/data
    networks:
      - xero-c2
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  c2-api:
    build:
      context: .
      dockerfile: services/c2-api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      C2_SERVICE_NAME: ${C2_SERVICE_NAME:-xero-c2-core}
      C2_DATABASE_URL: ${C2_DATABASE_URL:-postgresql://xero_c2:xero_c2_password@c2-postgres:5432/xero_c2}
      C2_DATABASE_POOL_SIZE: ${C2_DATABASE_POOL_SIZE:-5}
      C2_DATABASE_MAX_OVERFLOW: ${C2_DATABASE_MAX_OVERFLOW:-10}
      C2_DATABASE_POOL_TIMEOUT_SECONDS: ${C2_DATABASE_POOL_TIMEOUT_SECONDS:-30}
      C2_DATABASE_POOL_RECYCLE_SECONDS: ${C2_DATABASE_POOL_RECYCLE_SECONDS:-1800}
      C2_REDIS_URL: ${C2_REDIS_URL:-redis://c2-redis:6379/0}
      C2_REDIS_MAX_CONNECTIONS: ${C2_REDIS_MAX_CONNECTIONS:-20}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      C2_JWT_SECRET_KEY: ${C2_JWT_SECRET_KEY:-dev-only-xero-jwt-secret-change-me}
      C2_CONNECT_PASSWORD: ${C2_CONNECT_PASSWORD:-c2_password}
      C2_TOKEN_EXPIRES_MINUTES: ${C2_TOKEN_EXPIRES_MINUTES:-480}
      BEACON_DEFAULT_SLEEP_SECONDS: ${BEACON_DEFAULT_SLEEP_SECONDS:-30}
      BEACON_DEFAULT_JITTER: ${BEACON_DEFAULT_JITTER:-0.1}
      BEACON_HEARTBEAT_CHECK_INTERVAL_SECONDS: ${BEACON_HEARTBEAT_CHECK_INTERVAL_SECONDS:-30}
      BEACON_STALE_THRESHOLD_MULTIPLIER: ${BEACON_STALE_THRESHOLD_MULTIPLIER:-3}
      WORKER_PAIRING_TOKEN_EXPIRES_MINUTES: ${WORKER_PAIRING_TOKEN_EXPIRES_MINUTES:-15}
      WORKER_HEARTBEAT_INTERVAL_SECONDS: ${WORKER_HEARTBEAT_INTERVAL_SECONDS:-10}
      WORKER_STALE_THRESHOLD_SECONDS: ${WORKER_STALE_THRESHOLD_SECONDS:-30}
      C2_LOCAL_PROVISIONING_ENABLED: ${C2_LOCAL_PROVISIONING_ENABLED:-true}
      C2_WORKER_CONNECT_URL: ${C2_WORKER_CONNECT_URL:-http://host.docker.internal:8001}
      C2_PROVISIONING_PLATFORM_ROOT: ${C2_PROVISIONING_PLATFORM_ROOT:-/workspace/platform}
      C2_PROVISIONING_PROJECT_PREFIX: ${C2_PROVISIONING_PROJECT_PREFIX:-xero-managed}
      C2_PROTOCOL_PRIVATE_KEY_B64: ${C2_PROTOCOL_PRIVATE_KEY_B64:-AQIDBAUGBwgJCgsMDQ4PEBESExQVFhcYGRobHB0eHyA=}
      C2_PROTOCOL_FRAME_HARNESS_ENABLED: ${C2_PROTOCOL_FRAME_HARNESS_ENABLED:-false}
      C2_PROTOCOL_MAX_FRAME_BYTES: ${C2_PROTOCOL_MAX_FRAME_BYTES:-1048576}
      C2_PROTOCOL_SUPPORTED_VERSIONS: ${C2_PROTOCOL_SUPPORTED_VERSIONS:-1}
      C2_BEACON_WS_SEND_QUEUE_SIZE: ${C2_BEACON_WS_SEND_QUEUE_SIZE:-32}
      C2_BEACON_WS_REGISTRATION_TIMEOUT_SECONDS: ${C2_BEACON_WS_REGISTRATION_TIMEOUT_SECONDS:-5}
      C2_BEACON_WS_HEARTBEAT_TIMEOUT_SECONDS: ${C2_BEACON_WS_HEARTBEAT_TIMEOUT_SECONDS:-90}
      C2_BEACON_WS_PING_INTERVAL_SECONDS: ${C2_BEACON_WS_PING_INTERVAL_SECONDS:-30}
      C2_BEACON_WS_PING_TIMEOUT_SECONDS: ${C2_BEACON_WS_PING_TIMEOUT_SECONDS:-30}
      C2_BEACON_WS_MAX_MESSAGE_BYTES: ${C2_BEACON_WS_MAX_MESSAGE_BYTES:-1048576}
      C2_BEACON_LONGPOLL_TIMEOUT_SECONDS: ${C2_BEACON_LONGPOLL_TIMEOUT_SECONDS:-60}
      C2_BEACON_LONGPOLL_MAX_FRAME_BYTES: ${C2_BEACON_LONGPOLL_MAX_FRAME_BYTES:-1048576}
      C2_TASK_DEFAULT_TIMEOUT_SECONDS: ${C2_TASK_DEFAULT_TIMEOUT_SECONDS:-60}
      C2_TASK_MAX_TIMEOUT_SECONDS: ${C2_TASK_MAX_TIMEOUT_SECONDS:-3600}
      C2_TASK_RETENTION_DAYS: ${C2_TASK_RETENTION_DAYS:-30}
      C2_BEACON_BUILDS_ENABLED: ${C2_BEACON_BUILDS_ENABLED:-true}
      C2_BEACON_BUILD_ARTIFACT_DIR: ${C2_BEACON_BUILD_ARTIFACT_DIR:-/app/artifacts/beacons}
      C2_BEACON_BUILD_TIMEOUT_SECONDS: ${C2_BEACON_BUILD_TIMEOUT_SECONDS:-180}
      C2_BEACON_BUILD_GO_IMAGE: ${C2_BEACON_BUILD_GO_IMAGE:-golang:1.26}
    ports:
      - "${C2_BACKEND_PORT:-8001}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace/platform:ro
    depends_on:
      c2-postgres:
        condition: service_healthy
      c2-redis:
        condition: service_healthy
    networks:
      - xero-c2
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=3).read()\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

networks:
  xero-c2:
    driver: bridge

volumes:
  xero_c2_postgres_data:
  xero_c2_redis_data:
