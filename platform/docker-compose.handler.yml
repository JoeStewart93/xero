name: xero-handler

services:
  beacon-handler:
    build:
      context: .
      dockerfile: services/beacon-handler/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      HANDLER_SERVICE_NAME: ${HANDLER_SERVICE_NAME:-xero-beacon-handler}
      C2_BASE_URL: ${C2_BASE_URL:-}
      WORKER_PAIRING_TOKEN: ${WORKER_PAIRING_TOKEN:-}
      WORKER_NAME: ${WORKER_NAME:-xero-beacon-handler}
      WORKER_ENDPOINT: ${WORKER_ENDPOINT:-http://host.docker.internal:8002}
      WORKER_CAPACITY: ${WORKER_CAPACITY:-1000}
      WORKER_HEARTBEAT_INTERVAL_SECONDS: ${WORKER_HEARTBEAT_INTERVAL_SECONDS:-10}
    volumes:
      - xero_handler_data:/data
    ports:
      - "${HANDLER_PORT:-8002}:8000"
    networks:
      - xero-handler
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=3).read()\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

networks:
  xero-handler:
    driver: bridge

volumes:
  xero_handler_data:
