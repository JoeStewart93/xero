name: xero-scanner

services:
  scanner:
    build:
      context: .
      dockerfile: services/scanner/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      SCANNER_SERVICE_NAME: ${SCANNER_SERVICE_NAME:-xero-scanner}
      C2_BASE_URL: ${C2_BASE_URL:-}
      WORKER_PAIRING_TOKEN: ${WORKER_PAIRING_TOKEN:-}
      WORKER_NAME: ${WORKER_NAME:-xero-scanner}
      WORKER_ENDPOINT: ${WORKER_ENDPOINT:-http://host.docker.internal:8003}
      WORKER_CAPACITY: ${WORKER_CAPACITY:-25}
      WORKER_HEARTBEAT_INTERVAL_SECONDS: ${WORKER_HEARTBEAT_INTERVAL_SECONDS:-10}
    volumes:
      - xero_scanner_data:/data
    ports:
      - "${SCANNER_PORT:-8003}:8000"
    networks:
      - xero-scanner
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=3).read()\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

networks:
  xero-scanner:
    driver: bridge

volumes:
  xero_scanner_data:
