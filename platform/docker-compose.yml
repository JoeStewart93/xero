name: xero

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xero}
      POSTGRES_USER: ${POSTGRES_USER:-xero}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xero_password}
    volumes:
      - xero_postgres_data:/var/lib/postgresql/data
    networks:
      - xero
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - xero_redis_data:/data
    networks:
      - xero
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      XERO_SERVICE_NAME: ${BFF_SERVICE_NAME:-xero-bff}
      XERO_SERVICE_ROLE: bff
      DATABASE_URL: ${DATABASE_URL:-postgresql://xero:xero_password@postgres:5432/xero}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-10}
      DATABASE_POOL_TIMEOUT_SECONDS: ${DATABASE_POOL_TIMEOUT_SECONDS:-30}
      DATABASE_POOL_RECYCLE_SECONDS: ${DATABASE_POOL_RECYCLE_SECONDS:-1800}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_MAX_CONNECTIONS: ${REDIS_MAX_CONNECTIONS:-20}
      REDIS_QUEUE_DEQUEUE_TIMEOUT_SECONDS: ${REDIS_QUEUE_DEQUEUE_TIMEOUT_SECONDS:-1}
      REDIS_RATE_LIMIT_ENABLED: ${REDIS_RATE_LIMIT_ENABLED:-true}
      REDIS_RATE_LIMIT_REQUESTS: ${REDIS_RATE_LIMIT_REQUESTS:-120}
      REDIS_RATE_LIMIT_WINDOW_SECONDS: ${REDIS_RATE_LIMIT_WINDOW_SECONDS:-60}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      OPERATOR_USERNAME: ${OPERATOR_USERNAME:-operator}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD:-operator_password}
      LOCAL_ADMIN_USERNAME: ${LOCAL_ADMIN_USERNAME:-admin}
      LOCAL_ADMIN_PASSWORD: ${LOCAL_ADMIN_PASSWORD:-admin}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-xero-jwt-secret-change-me}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-60}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      C2_CONNECT_PASSWORD: ${C2_CONNECT_PASSWORD:-c2_password}
      BEACON_DEFAULT_SLEEP_SECONDS: ${BEACON_DEFAULT_SLEEP_SECONDS:-30}
      BEACON_DEFAULT_JITTER: ${BEACON_DEFAULT_JITTER:-0.1}
      BEACON_HEARTBEAT_CHECK_INTERVAL_SECONDS: ${BEACON_HEARTBEAT_CHECK_INTERVAL_SECONDS:-30}
      BEACON_STALE_THRESHOLD_MULTIPLIER: ${BEACON_STALE_THRESHOLD_MULTIPLIER:-3}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xero
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=3).read()\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_DEFAULT_C2_BASE_URL: ${VITE_DEFAULT_C2_BASE_URL:-http://localhost:8001}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - xero
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/login || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

networks:
  xero:
    driver: bridge

volumes:
  xero_postgres_data:
  xero_redis_data:
