components:
  schemas:
    BeaconBuildCreateRequest:
      properties:
        target_os:
          type: string
          enum:
          - linux
          - windows
          title: Target Os
          default: linux
        target_arch:
          type: string
          const: amd64
          title: Target Arch
          default: amd64
        c2_url:
          type: string
          maxLength: 512
          minLength: 8
          title: C2 Url
        profile_name:
          type: string
          maxLength: 128
          minLength: 1
          title: Profile Name
          default: default
        sleep_seconds:
          type: integer
          maximum: 86400.0
          minimum: 1.0
          title: Sleep Seconds
          default: 30
        jitter:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Jitter
          default: 0.1
        user_agent:
          anyOf:
          - type: string
            maxLength: 255
          - type: 'null'
          title: User Agent
        config_mode:
          type: string
          enum:
          - all
          - env
          - file
          - ldflags
          title: Config Mode
          default: all
        fallback_longpoll_enabled:
          type: boolean
          title: Fallback Longpoll Enabled
          default: true
        output_limit_bytes:
          type: integer
          maximum: 1048576.0
          minimum: 1024.0
          title: Output Limit Bytes
          default: 65536
        output_name:
          anyOf:
          - type: string
            maxLength: 128
          - type: 'null'
          title: Output Name
      type: object
      required:
      - c2_url
      title: BeaconBuildCreateRequest
    BeaconBuildListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/BeaconBuildResponse'
          type: array
          title: Items
      type: object
      title: BeaconBuildListResponse
    BeaconBuildResponse:
      properties:
        id:
          type: string
          title: Id
        target_os:
          type: string
          enum:
          - linux
          - windows
          title: Target Os
        target_arch:
          type: string
          const: amd64
          title: Target Arch
        status:
          type: string
          enum:
          - building
          - failed
          - queued
          - succeeded
          title: Status
        profile_name:
          type: string
          title: Profile Name
        config:
          additionalProperties: true
          type: object
          title: Config
        artifact_filename:
          anyOf:
          - type: string
          - type: 'null'
          title: Artifact Filename
        artifact_sha256:
          anyOf:
          - type: string
          - type: 'null'
          title: Artifact Sha256
        artifact_size:
          anyOf:
          - type: integer
          - type: 'null'
          title: Artifact Size
        logs_tail:
          anyOf:
          - type: string
