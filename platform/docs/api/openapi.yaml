openapi: 3.1.0
info:
  title: Xero Core
  version: 0.1.0
paths:
  /health:
    get:
      tags:
      - health
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Health Get
  /ready:
    get:
      tags:
      - health
      summary: Ready
      operationId: ready_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /auth/login:
    post:
      tags:
      - auth
      summary: Login
      operationId: login_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/c2/connect:
    post:
      tags:
      - c2
      summary: Connect C2
      operationId: connect_c2_api_v1_c2_connect_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/C2ConnectRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/C2ConnectResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/c2/session:
    get:
      tags:
      - c2
      summary: C2 Session
      operationId: c2_session_api_v1_c2_session_get
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/C2SessionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/beacons/register:
    post:
      tags:
      - beacons
      summary: Register Beacon
      operationId: register_beacon_api_v1_beacons_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BeaconRegistrationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BeaconRegistrationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/beacons/{beacon_id}/heartbeat:
    post:
      tags:
      - beacons
      summary: Heartbeat Beacon
      operationId: heartbeat_beacon_api_v1_beacons__beacon_id__heartbeat_post
      parameters:
      - name: beacon_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Beacon Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BeaconHeartbeatRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BeaconHeartbeatResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/beacons:
    get:
      tags:
      - beacons
      summary: List Beacons
      operationId: list_beacons_api_v1_beacons_get
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            pattern: ^(online|offline)$
          - type: 'null'
          title: Status
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BeaconListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/beacons/{beacon_id}:
    get:
      tags:
      - beacons
      summary: Get Beacon
      operationId: get_beacon_api_v1_beacons__beacon_id__get
      parameters:
      - name: beacon_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Beacon Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BeaconResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/health:
    get:
      tags:
      - operator
      - health
      summary: Api Health
      operationId: api_health_api_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Api Health Api V1 Health Get
        '429':
          description: Rate limit exceeded
      security:
      - OAuth2PasswordBearer: []
  /api/v1/ready:
    get:
      tags:
      - operator
      - health
      summary: Api Ready
      operationId: api_ready_api_v1_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '429':
          description: Rate limit exceeded
      security:
      - OAuth2PasswordBearer: []
  /api/v1/me:
    get:
      tags:
      - operator
      summary: Current Operator
      operationId: current_operator_api_v1_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorResponse'
        '429':
          description: Rate limit exceeded
      security:
      - OAuth2PasswordBearer: []
  /api/v1/auth/password:
    post:
      tags:
      - operator
      summary: Change Password
      operationId: change_password_api_v1_auth_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '429':
          description: Rate limit exceeded
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
components:
  schemas:
    BeaconHeartbeatRequest:
      properties:
        hostname:
          anyOf:
          - type: string
            maxLength: 255
            minLength: 1
          - type: 'null'
          title: Hostname
        os:
          anyOf:
          - type: string
            maxLength: 128
            minLength: 1
          - type: 'null'
          title: Os
        architecture:
          anyOf:
          - type: string
            maxLength: 64
            minLength: 1
          - type: 'null'
          title: Architecture
        internal_ip:
          anyOf:
          - type: string
            maxLength: 64
            minLength: 3
          - type: 'null'
          title: Internal Ip
        external_ip:
          anyOf:
          - type: string
            maxLength: 64
            minLength: 3
          - type: 'null'
          title: External Ip
        pid:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Pid
      type: object
      title: BeaconHeartbeatRequest
    BeaconHeartbeatResponse:
      properties:
        status:
          type: string
          title: Status
        sleep:
          type: integer
          title: Sleep
        jitter:
          type: number
          title: Jitter
        beacon:
          $ref: '#/components/schemas/BeaconResponse'
      type: object
      required:
      - status
      - sleep
      - jitter
      - beacon
      title: BeaconHeartbeatResponse
    BeaconListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/BeaconResponse'
          type: array
          title: Items
      type: object
      title: BeaconListResponse
    BeaconRegistrationRequest:
      properties:
        machine_fingerprint_hash:
          type: string
          maxLength: 128
          minLength: 8
          title: Machine Fingerprint Hash
        hostname:
          type: string
          maxLength: 255
          minLength: 1
          title: Hostname
        os:
          type: string
          maxLength: 128
          minLength: 1
          title: Os
        architecture:
          type: string
          maxLength: 64
          minLength: 1
          title: Architecture
        internal_ip:
          type: string
          maxLength: 64
          minLength: 3
          title: Internal Ip
        external_ip:
          anyOf:
          - type: string
            maxLength: 64
            minLength: 3
          - type: 'null'
          title: External Ip
        pid:
          type: integer
          minimum: 0.0
          title: Pid
      type: object
      required:
      - machine_fingerprint_hash
      - hostname
      - os
      - architecture
      - internal_ip
      - pid
      title: BeaconRegistrationRequest
    BeaconRegistrationResponse:
      properties:
        beacon_id:
          type: string
          title: Beacon Id
        beacon_token:
          type: string
          title: Beacon Token
        status:
          type: string
          title: Status
        sleep:
          type: integer
          title: Sleep
          default: 30
        jitter:
          type: number
          title: Jitter
          default: 0.1
        beacon:
          $ref: '#/components/schemas/BeaconResponse'
      type: object
      required:
      - beacon_id
      - beacon_token
      - status
      - beacon
      title: BeaconRegistrationResponse
    BeaconResponse:
      properties:
        id:
          type: string
          title: Id
        machine_fingerprint_hash:
          type: string
          title: Machine Fingerprint Hash
        hostname:
          type: string
          title: Hostname
        os:
          type: string
          title: Os
        architecture:
          type: string
          title: Architecture
        internal_ip:
          type: string
          title: Internal Ip
        external_ip:
          anyOf:
          - type: string
          - type: 'null'
          title: External Ip
        pid:
          type: integer
          title: Pid
        status:
          type: string
          title: Status
        first_seen:
          type: string
          format: date-time
          title: First Seen
        last_seen:
          type: string
          format: date-time
          title: Last Seen
      type: object
      required:
      - id
      - machine_fingerprint_hash
      - hostname
      - os
      - architecture
      - internal_ip
      - pid
      - status
      - first_seen
      - last_seen
      title: BeaconResponse
    C2ConnectRequest:
      properties:
        password:
          type: string
          maxLength: 128
          minLength: 1
          title: Password
      type: object
      required:
      - password
      title: C2ConnectRequest
    C2ConnectResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        token_type:
          type: string
          title: Token Type
          default: bearer
        expires_at:
          type: string
          format: date-time
          title: Expires At
        service:
          type: string
          title: Service
        service_role:
          type: string
          title: Service Role
        status:
          type: string
          title: Status
          default: connected
      type: object
      required:
      - access_token
      - expires_at
      - service
      - service_role
      title: C2ConnectResponse
    C2SessionResponse:
      properties:
        service:
          type: string
          title: Service
        service_role:
          type: string
          title: Service Role
        status:
          type: string
          title: Status
      type: object
      required:
      - service
      - service_role
      - status
      title: C2SessionResponse
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    LoginRequest:
      properties:
        username:
          type: string
          maxLength: 64
          minLength: 1
          title: Username
        password:
          type: string
          maxLength: 72
          minLength: 1
          title: Password
      type: object
      required:
      - username
      - password
      title: LoginRequest
    OperatorResponse:
      properties:
        id:
          type: string
          title: Id
        username:
          type: string
          title: Username
        role:
          type: string
          title: Role
          default: operator
        is_enabled:
          type: boolean
          title: Is Enabled
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - id
      - username
      - is_enabled
      - created_at
      title: OperatorResponse
    PasswordChangeRequest:
      properties:
        current_password:
          type: string
          maxLength: 72
          minLength: 1
          title: Current Password
        new_password:
          type: string
          maxLength: 72
          minLength: 1
          title: New Password
      type: object
      required:
      - current_password
      - new_password
      title: PasswordChangeRequest
    StatusResponse:
      properties:
        status:
          type: string
          title: Status
      type: object
      required:
      - status
      title: StatusResponse
    TokenResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        token_type:
          type: string
          title: Token Type
          default: bearer
        expires_at:
          type: string
          format: date-time
          title: Expires At
        operator:
          $ref: '#/components/schemas/OperatorResponse'
      type: object
      required:
      - access_token
      - expires_at
      - operator
      title: TokenResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
  securitySchemes:
    OAuth2PasswordBearer:
      type: oauth2
      flows:
        password:
          scopes: {}
          tokenUrl: /auth/login
